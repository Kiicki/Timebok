<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1f6feb" />
  <meta name="description" content="Timebok – timeliste, reisegodtgjørelse og kvitteringer" />
  <title>Timebok</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/svg+xml" href="assets/icons/icon.svg" />
  <link rel="apple-touch-icon" href="assets/icons/icon.svg" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="app" class="app">
    <header class="topbar" id="topbar" hidden>
      <div class="topbar-row">
        <button class="icon-btn" id="backBtn" aria-label="Tilbake til ukeoversikt" title="Ukeoversikt" hidden>
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M7 2v2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-2V2h-2v2H9V2H7zM5 8h14v12H5V8z"/></svg>
        </button>
        <button class="icon-btn nav-arrow" id="prevBtn" aria-label="Forrige" hidden>
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M15.7 4.3a1 1 0 0 1 0 1.4L9.4 12l6.3 6.3a1 1 0 1 1-1.4 1.4l-7-7a1 1 0 0 1 0-1.4l7-7a1 1 0 0 1 1.4 0z"/></svg>
        </button>
        <div class="brand-wrap">
          <button class="brand" id="topbarTitle" type="button">Timebok</button>
          <div class="brand-sub" id="topbarSub" hidden></div>
        </div>
        <button class="icon-btn nav-arrow" id="nextBtn" aria-label="Neste" hidden>
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M8.3 4.3a1 1 0 0 1 1.4 0l7 7a1 1 0 0 1 0 1.4l-7 7a1 1 0 1 1-1.4-1.4L14.6 12 8.3 5.7a1 1 0 0 1 0-1.4z"/></svg>
        </button>
        <button class="icon-btn" id="menuBtn" aria-label="Meny">
          <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path fill="currentColor" d="M3 6h18v2H3zm0 5h18v2H3zm0 5h18v2H3z"/></svg>
        </button>
      </div>
    </header>

    <nav class="drawer" id="drawer" hidden>
      <div class="drawer-backdrop" data-close-drawer></div>
      <aside class="drawer-panel">
        <div class="drawer-user">
          <div class="avatar" id="navAvatar">·</div>
          <div>
            <div class="drawer-name" id="navName">—</div>
            <div class="drawer-email" id="navEmail">—</div>
          </div>
        </div>
        <ul class="drawer-list">
          <li><a href="#/week" data-i18n="nav.week">Uke</a></li>
          <li><a href="#/period" data-i18n="nav.period">Periode</a></li>
          <li class="admin-only"><a href="#/admin" data-i18n="nav.admin">Admin</a></li>
          <li><a href="#/profile" data-i18n="nav.profile">Profil</a></li>
          <li><a href="#" id="logoutBtn" data-i18n="nav.logout">Logg ut</a></li>
        </ul>
        <div class="drawer-footer">
          <small id="dataSourceLabel">—</small>
        </div>
      </aside>
    </nav>

    <main id="view" class="view"></main>

    <div id="toast" class="toast" hidden></div>
    <div id="modal" class="modal" hidden>
      <div class="modal-backdrop" data-close-modal></div>
      <div class="modal-panel" id="modalPanel" role="dialog" aria-modal="true"></div>
    </div>
  </div>

  <!-- Script load order matters: utilities first, then app modules, finally boot. -->
  <script src="firebase-config.js"></script>
  <script src="js/utils/date.js"></script>
  <script src="js/utils/dom.js"></script>
  <script src="js/utils/wheel-picker.js"></script>
  <script src="js/utils/clock-picker.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/codes.js"></script>
  <script src="js/calc.js"></script>
  <script src="js/data.js"></script>
  <script src="js/state.js"></script>
  <script src="js/router.js"></script>
  <script src="js/export-pdf.js"></script>
  <script src="js/export-excel.js"></script>
  <script src="js/views/login.js"></script>
  <script src="js/views/week.js"></script>
  <script src="js/views/day.js"></script>
  <script src="js/views/period.js"></script>
  <script src="js/views/admin.js"></script>
  <script src="js/views/profile.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
